name: Build iOS IPA & Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Release Artifacts
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '11'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.x'
        channel: 'stable'

    - name: Install dependencies
      run: |
        cd lushmkt_mobile
        flutter pub get

    - name: Build Android APK (For fast testing)
      run: |
        cd lushmkt_mobile
        flutter build apk --release

    - name: Build iOS App (Ad-Hoc/Simulator/Sideload Package)
      run: |
        cd lushmkt_mobile
        # Build without signing (ideal for Sideloading via Sideloadly / AltStore)
        flutter build ios --release --no-codesign
        
        # Package the .app into an installable .ipa
        mkdir -p Payload
        mv build/ios/iphoneos/Runner.app Payload/
        zip -r LushMKT.ipa Payload
        mv LushMKT.ipa build/

    - name: Upload iOS IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LushMKT-iOS-IPA
        path: lushmkt_mobile/build/LushMKT.ipa

    - name: Upload Android APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LushMKT-Android-APK
        path: lushmkt_mobile/build/app/outputs/flutter-apk/app-release.apk

name: lushmkt_app
description: "LushMKT - Premium MMO Service & Resource Marketplace Mobile Client."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management (Riverpod)
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.3

  # Legacy State Management (Temporary for migration transition)
  get: ^4.6.6

  # Declarative Routing (GoRouter)
  go_router: ^13.0.0

  # Networking & API Integration
  dio: ^5.4.0

  # Local NoSQL Database & Storage (Hive + SharedPreferences)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # Realtime Communication
  web_socket_channel: ^2.4.1

  # UI Design, Custom Fonts, Icons & Animations
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  carousel_slider: ^4.2.1
  badges: ^3.1.2
  cached_network_image: ^3.3.1
  font_awesome_flutter: ^10.6.0
  intl: ^0.19.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  hive_generator: ^2.0.1
  riverpod_generator: ^2.3.9
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: false
  ios: true
  image_path: "image/logolussh.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - image/

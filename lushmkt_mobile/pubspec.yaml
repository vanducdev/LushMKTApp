name: lushmkt_mobile
description: "LushMKT - Premium MMO Service & Resource Marketplace Mobile Client."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management & Routing
  get: ^4.6.6

  # Networking & API Integration
  dio: ^5.4.0

  # Local Storage for JWT & Preferences
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # UI Design, Custom Fonts, Icons & Animations
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  carousel_slider: ^4.2.1
  badges: ^3.1.2
  cached_network_image: ^3.3.1
  font_awesome_flutter: ^10.6.0
  intl: ^0.19.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - image/
